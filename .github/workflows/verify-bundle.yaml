name: Verify Bundle
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  # This is a required workflow, so it must always run and report a status.
  # We use dorny/paths-filter at the job level instead of workflow-level path filters
  # to ensure the workflow runs and the "done" job reports success even when no relevant files change.
  # This prevents PRs from being blocked by missing status checks.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      bundle: ${{ steps.filter.outputs.bundle }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
        id: filter
        with:
          filters: |
            bundle:
              - 'pkg/**'
              - 'instrumentation/**'
              - 'tool/data/otelc-bundle.tgz'

  verify-bundle:
    name: Verify Bundle
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.bundle == 'true'
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - name: Verify bundle
        run: ./.github/scripts/verify-bundle.sh

  done:
    name: Done (Verify Bundle)
    runs-on: ubuntu-latest
    needs: [changes, verify-bundle]
    if: always()
    steps:
      - name: Check result
        run: |
          result="${{ needs.verify-bundle.result }}"
          echo "Test result: $result"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            echo "✅ Tests passed or were skipped"
            exit 0
          else
            echo "❌ Tests failed"
            exit 1
          fi
