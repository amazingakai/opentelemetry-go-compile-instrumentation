mongodb_hook_connect:
  target: go.mongodb.org/mongo-driver/mongo
  where:
    func: Connect
  do:
    - inject_hooks:
        before: BeforeConnect
        path: "go.opentelemetry.io/otelc/instrumentation/go.mongodb.org/mongo-driver/mongo"

mongodb_hook_newclient:
  target: go.mongodb.org/mongo-driver/mongo
  where:
    func: NewClient
  do:
    - inject_hooks:
        before: BeforeNewClient
        path: "go.opentelemetry.io/otelc/instrumentation/go.mongodb.org/mongo-driver/mongo"
