# Instrumentation for log to inject trace context into log messages

hook_log_output:
  target: log
  where:
    func: output
    recv: "*Logger"
  do:
    - inject_hooks:
        before: BeforeLogOutput
        path: "go.opentelemetry.io/otelc/instrumentation/log"
